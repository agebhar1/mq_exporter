---
name: CI

on: [push]

jobs:
  test-and-build:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        go: [ '1.16', '1.17', '1.18' ]
    container: registry.access.redhat.com/ubi8/ubi-minimal:8.6-854
    name: Test and Build
    steps:
      - name: Install prerequisites
        run: microdnf install tar gzip findutils gcc make

      - uses: actions/checkout@v2
        name: Checkout code

      # curl 'https://catalog.redhat.com/api/containers/v1/repositories/registry/registry.access.redhat.com/repository/ubi8-minimal/images?page_size=500&page=0&exclude=data.repositories.comparison,data.brew,data.cpe_ids,data.top_layer_id' | jq  -r '[ .data[] | select(.architecture == "amd64") | select(.repositories[].tags[].name == "latest") | .repositories[].tags[].name | select(contains("latest") | not) ] | unique | sort_by(length) | reverse | .[0]'

      - uses: actions/setup-go@v2
        name: Install Go v${{ matrix.go }}
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Handle Cache for Go Package(s)
        uses: actions/cache@v2
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download/Install IBM MQ Redistributable
        run: |
          # https://developer.ibm.com/articles/mq-downloads/
          mkdir /opt/mqm
          curl -L https://ibm.biz/IBM-MQC-Redist-LinuxX64targz | tar xzf - -C /opt/mqm/

      - name: Build
        run: |
          make
